spring:
  datasource:
    url: jdbc:sqlite:soul.db
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  servlet:
    multipart:
      max-file-size: 200MB
      max-request-size: 200MB

  data:
    redis:
      host: localhost
      port: 6379

server:
  tomcat:
    max-swallow-size: 200MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

qdrant:
  host: localhost
  port: 6334
  rest-port: 6333
  collection: memory
  dimension: 1024

langchain4j:
  open-ai:
    chat-model:
      api-key: ${AI_API_KEY:sk-xxx}
      model-name: gpt-4o-mini
      log-requests: true
      log-responses: true